services:
  # Base de Datos
  - type: database
    name: picas-fijas-db
    databaseName: picas_fijas
    user: rafael

  # Backend (Spring Boot)
  - type: web
    name: picas-fijas-backend
    env: java
    buildCommand: mvn clean install -DskipTests
    startCommand: java -jar target/picas-fijas-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: picas-fijas-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: picas-fijas-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: picas-fijas-db
          property: password

  # Frontend (Static Site)
  - type: web
    name: picas-fijas-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishCustomDirectory: dist
    envVars:
      - key: VITE_API_URL
        value: https://picas-fijas-backend.onrender.com
